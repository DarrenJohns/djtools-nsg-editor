# Deploy NSG Rule Editor to Azure Static Web Apps
#
# Triggers on push to main (when index.html changes) and manual dispatch.
# Runs on a GitHub-hosted ubuntu-latest runner.
# Requires the production environment to expose the SWA_DEPLOYMENT_TOKEN secret.

name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Static Website
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nsgeditor.djtools.co.nz/
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Stage deployment payload
        run: |
          mkdir -p staging
          cp index.html staging/

      - name: Deploy to Azure Static Web Apps
        env:
          SWA_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
        run: |
          npx --yes @azure/static-web-apps-cli@latest deploy ./staging \
            --deployment-token "$SWA_TOKEN" \
            --env production

      - name: Write run summary
        run: |
          {
            echo "### Deployed to Azure Static Web Apps :rocket:"
            echo ""
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "- URL: https://nsgeditor.djtools.co.nz/"
          } >> "$GITHUB_STEP_SUMMARY"
