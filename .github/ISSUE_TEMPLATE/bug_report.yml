name: 🐛 Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!
  - type: input
    id: browser
    attributes:
      label: Browser & Version
      placeholder: e.g. Edge 124, Chrome 125, Firefox 126
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what happened vs what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low — cosmetic issue
        - Medium — feature partially broken
        - High — feature completely broken
        - Critical — app crashes or data loss
    validations:
      required: true
